apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: kv
    kind: SecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: "monitoring/admin-credentials"
        property: "username"
    - secretKey: password
      remoteRef:
        key: "monitoring/admin-credentials"
        property: "password"
