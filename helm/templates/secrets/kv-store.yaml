apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kv
spec:
  provider:
    vault:
      server: "http://secrets-manager-openbao.secrets-manager.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "monitoring-role"
          serviceAccountRef:
            name: "monitoring-grafana"
